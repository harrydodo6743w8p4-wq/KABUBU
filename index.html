<!DOCTYPE html>
<html lang="ja">
<head>
<!--
==========================================================================
RotationFollow_v3 — 週次ローテーション追従ダッシュボード
==========================================================================
README:
  テーマ/銘柄変更: CONFIG.THEMES / CONFIG.TICKERS を編集
  文字コード: Shift_JIS(CP932) を TextDecoder('shift_jis') でデコード
              BOM付きUTF-8 は自動検出してフォールバック
  テスト実行: URL に ?test=1 を付けてアクセス
  Chart実装: 末尾 <script id="chartjs-vendor"> にCanvas描画をインライン同梱
==========================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KABUBU">
<link rel="apple-touch-icon" href="icon.png">
<title>RotationFollow v3</title>
<style>
:root {
  --bg: #2B2B28;
  --bg2: #201F1D;
  --bg3: #252421;
  --border: #4E4A38;
  --text: #F0EAD6;
  --text2: #9A8E6E;
  --red: #C04030;
  --yellow: #B5A642;
  --blue: #5C8BA5;
  --purple: #7A5EA0;
  --green: #4E7845;
  --white: #58584C;
  --radius: 10px;
  --tap: 44px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman','Yu Gothic UI','游ゴシック','Hiragino Kaku Gothic Pro',system-ui,sans-serif;font-size:15px;line-height:1.5}
body{padding-bottom:env(safe-area-inset-bottom)}

/* NAV */
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding-top:env(safe-area-inset-top)}
.nav-btn{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;min-height:var(--tap)}
.nav-btn.active{color:var(--text);border-bottom:2px solid var(--yellow)}

/* SCREENS */
.screen{display:none;padding:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 16px)}
.screen.active{display:block}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.08em;margin-bottom:10px;font-family:Georgia,'Times New Roman',serif}

/* MEMO BANNER */
.memo-banner{background:var(--bg3);border-left:3px solid var(--yellow);border-radius:0 var(--radius) var(--radius) 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text2)}
.memo-banner strong{color:var(--text);display:block;font-size:11px;margin-bottom:2px}

/* THEME ROWS */
.theme-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:var(--tap)}
.theme-row:last-child{border-bottom:none}
.theme-badge{font-size:11px;font-weight:700;padding:3px 7px;border-radius:12px;white-space:nowrap;min-width:36px;text-align:center}
.badge-enthu{background:var(--red);color:var(--text)}
.badge-inflow{background:var(--yellow);color:#1A1A18}
.badge-neutral{background:var(--white);color:var(--text)}
.badge-outflow{background:var(--blue);color:var(--text)}
.theme-name{flex:1;font-size:14px;font-weight:600}
.theme-meta{font-size:11px;color:var(--text2);text-align:right;line-height:1.4}
.theme-leading{font-size:11px;color:var(--yellow);margin-left:4px}
.delta-pos{color:var(--green)}
.delta-neg{color:var(--red)}
.delta-zero{color:var(--text2)}

/* THEME BAR */
.theme-bar-wrap{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;flex:1;min-width:60px}
.theme-bar-fill{height:100%;border-radius:5px;transition:width .3s}

/* TICKER CARDS */
.ticker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:480px){.ticker-grid{grid-template-columns:repeat(3,1fr)}}
.ticker-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s}
.ticker-card:active{opacity:.8}
.ticker-card.sig-red{border-color:var(--red);border-width:2px}
.ticker-card.sig-yellow{border-color:var(--yellow)}
.ticker-card.sig-blue{border-color:var(--blue)}
.ticker-card.sig-purple{border-color:var(--purple)}
.ticker-sig{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;margin-bottom:8px}
.sig-red .ticker-sig{background:rgba(192,64,48,.18);color:var(--red)}
.sig-yellow .ticker-sig{background:rgba(181,166,66,.18);color:var(--yellow)}
.sig-blue .ticker-sig{background:rgba(92,139,165,.18);color:var(--blue)}
.sig-purple .ticker-sig{background:rgba(122,94,160,.18);color:var(--purple)}
.sig-white .ticker-sig{background:var(--bg2);color:var(--text2)}
.ticker-name{font-size:13px;font-weight:700;margin-bottom:2px}
.ticker-code{font-size:11px;color:var(--text2)}
.ticker-score{font-size:22px;font-weight:800;line-height:1;margin:8px 0 4px;font-family:Georgia,'Times New Roman',serif;color:var(--yellow)}
.ticker-metrics{font-size:11px;color:var(--text2);line-height:1.6}
.ticker-reason{font-size:11px;color:var(--red);margin-top:6px;line-height:1.4}
.ticker-comment{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.6;font-style:italic;border-top:1px solid var(--border);padding-top:6px}
.ticker-alert-section{margin-bottom:12px}
.ticker-alert-section .card-title{color:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;overflow-y:auto;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;margin:16px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:700;font-family:Georgia,'Times New Roman',serif}
.modal-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;line-height:1;padding:0 4px;min-width:var(--tap);min-height:var(--tap);display:flex;align-items:center;justify-content:flex-end}
.modal-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.metric-box{background:var(--bg3);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.metric-box label{display:block;font-size:10px;color:var(--text2);margin-bottom:2px}
.metric-box value{display:block;font-size:18px;font-weight:700;font-family:Georgia,'Times New Roman',serif}
.chart-wrap{position:relative;height:160px;margin-bottom:14px}
canvas.chart-canvas{width:100%!important;height:160px!important}
.modal-memo{background:var(--bg3);border-left:3px solid var(--yellow);padding:8px 12px;border-radius:0 8px 8px 0;font-size:12px;color:var(--text2);margin-top:10px}

/* INPUT SCREEN */
.step-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.step-num{background:var(--yellow);color:#1A1A18;font-size:12px;font-weight:700;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:15px;font-weight:700}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 16px;text-align:center;cursor:pointer;transition:border-color .2s;min-height:var(--tap)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--yellow)}
.drop-zone p{color:var(--text2);font-size:13px;margin-top:8px}
.drop-zone input[type=file]{display:none}

/* TOGGLE GROUPS */
.toggle-group{display:flex;gap:4px;flex-wrap:wrap}
.toggle-btn{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;min-height:var(--tap);transition:all .15s}
.toggle-btn.active{background:var(--yellow);color:#1A1A18;border-color:var(--yellow)}
.toggle-btn.active.enthu{background:var(--red);color:var(--text);border-color:var(--red)}
.toggle-btn.active.inflow{background:var(--yellow);border-color:var(--yellow);color:#1A1A18}
.toggle-btn.active.neutral{background:var(--white);border-color:var(--white);color:var(--text)}
.toggle-btn.active.outflow{background:var(--blue);border-color:var(--blue);color:var(--text)}
.toggle-btn.active.cons-up{background:var(--green);border-color:var(--green);color:var(--text)}
.toggle-btn.active.cons-hold{background:var(--white);border-color:var(--white);color:var(--text)}
.toggle-btn.active.cons-down{background:var(--purple);border-color:var(--purple);color:var(--text)}

/* FORM ELEMENTS */
.form-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-label{flex:1;font-size:13px;font-weight:600}
.form-sub{font-size:11px;color:var(--text2)}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:14px;width:90px;text-align:right;min-height:var(--tap)}
.form-input:focus{outline:none;border-color:var(--yellow)}
.leading-input{width:120px}
textarea.form-input{width:100%;height:56px;resize:none;text-align:left}

/* CSV PREVIEW */
.csv-preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.csv-preview-table th,.csv-preview-table td{padding:6px 8px;border:1px solid var(--border);text-align:right}
.csv-preview-table th{background:var(--bg3);color:var(--text2);font-weight:600}
.csv-preview-table td:first-child{text-align:left}
.csv-error-list{margin-top:8px;font-size:12px;color:var(--red)}
.csv-error-list li{padding:2px 0}

/* BTN */
.btn{display:flex;align-items:center;justify-content:center;padding:14px 20px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;border:none;min-height:var(--tap);transition:opacity .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--yellow);color:#1A1A18;width:100%}
.btn-export{background:var(--bg3);color:var(--text2);border:1px solid var(--border);font-size:13px;padding:10px 16px}
.btn-row{display:flex;gap:8px;margin-top:12px}

/* TEST PANEL */
#test-panel{padding:16px;padding-top:calc(env(safe-area-inset-top) + 16px)}
.test-result{font-family:monospace;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)}
.test-pass{color:var(--green)}
.test-fail{color:var(--red)}
.test-summary{margin-top:12px;font-size:15px;font-weight:700}

/* VOYAGE LOG */
.voyage-log-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;min-height:var(--tap)}
.voyage-log-arrow{color:var(--yellow);font-size:12px;transition:transform .2s}
.voyage-log-arrow.open{transform:rotate(90deg)}
.voyage-log-body{display:none;margin-top:8px}
.voyage-log-body.open{display:block}
.voyage-row{padding:8px 0;border-bottom:1px solid var(--border)}
.voyage-row:last-child{border-bottom:none}
.voyage-row-id{font-size:12px;font-weight:700;color:var(--yellow);font-family:Georgia,'Times New Roman',serif}
.voyage-row-climate{font-size:12px;color:var(--text2);margin-left:6px}
.voyage-row-memo{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5;font-style:italic}
.voyage-log-empty{font-size:12px;color:var(--text2);font-style:italic}

/* UTIL */
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:6px;background:var(--bg3);color:var(--text2);margin-left:4px;border:1px solid var(--border)}
.empty-state{text-align:center;padding:32px 16px;color:var(--text2);font-size:14px}
.divider{height:1px;background:var(--border);margin:12px 0}
.section-label{font-size:12px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;font-family:Georgia,'Times New Roman',serif}

/* DATA QUALITY BADGES */
.dq-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.04em;vertical-align:middle;margin-left:4px;font-family:Georgia,'Times New Roman',serif;font-style:normal}
.dq-excellent{background:rgba(181,166,66,.18);color:#B5A642;border:1px solid rgba(181,166,66,.35)}
.dq-good{background:rgba(78,120,69,.18);color:#6aaa60;border:1px solid rgba(78,120,69,.35)}
.dq-fair{background:rgba(154,142,110,.12);color:#9A8E6E;border:1px solid rgba(154,142,110,.3)}
.dq-poor{background:rgba(192,64,48,.15);color:#c06050;border:1px solid rgba(192,64,48,.3)}
.dq-warn{font-size:10px;color:var(--text2);margin-top:4px;margin-bottom:2px;line-height:1.5;font-style:italic}

/* POCKET WATCH */
#pocket-watch{position:fixed;top:calc(env(safe-area-inset-top) + 50px);right:12px;z-index:90;line-height:0}
.pocket-watch-wrap{cursor:pointer;-webkit-tap-highlight-color:transparent;display:block;transition:opacity .15s}
.pocket-watch-wrap:active{opacity:.7}
.watch-tooltip{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--text2);width:190px;line-height:1.5;font-style:italic;box-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <button class="nav-btn active" onclick="navigate('dashboard')" id="nav-dashboard">ダッシュボード</button>
  <button class="nav-btn" onclick="navigate('input')" id="nav-input">データ入力</button>
</nav>

<!-- SCREEN: DASHBOARD -->
<div class="screen active" id="screen-dashboard">
  <div class="memo-banner" id="save-info-banner" style="display:none;border-left-color:var(--green)"></div>
  <div class="memo-banner" id="climate-banner" style="display:none">
    <strong>本日の空模様</strong>
    <span id="climate-text"></span>
  </div>
  <div class="memo-banner" id="memo-banner" style="display:none">
    <strong>未来備忘録</strong>
    <span id="memo-text"></span>
  </div>

  <div class="card" id="market-temp-card" style="display:none">
    <div style="display:flex;align-items:center;gap:12px">
      <svg viewBox="0 0 20 72" width="20" height="72" aria-hidden="true" style="flex-shrink:0">
        <rect x="7" y="4" width="6" height="46" rx="3" fill="#252421" stroke="#4E4A38" stroke-width="1"/>
        <circle cx="10" cy="60" r="9" fill="#252421" stroke="#4E4A38" stroke-width="1"/>
        <rect id="thermo-fill-tube" x="8" y="50" width="4" height="0" rx="1"/>
        <circle id="thermo-fill-bulb" cx="10" cy="60" r="7" fill="#58584C"/>
        <line x1="2" y1="32" x2="7" y2="32" stroke="#9A8E6E" stroke-width="1"/>
        <line x1="2" y1="22" x2="7" y2="22" stroke="#9A8E6E" stroke-width="1"/>
        <line x1="2" y1="13" x2="7" y2="13" stroke="#9A8E6E" stroke-width="1"/>
      </svg>
      <div style="flex:1;min-width:0">
        <div class="card-title" style="margin-bottom:4px">市場温度計 <span class="tag">Market Temp</span></div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span id="market-temp-label" style="font-size:20px;font-weight:800;font-family:Georgia,'Times New Roman',serif"></span>
          <span id="market-temp-score" style="font-size:12px;color:var(--text2)"></span>
        </div>
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:6px">
          <div id="market-temp-bar-fill" style="height:100%;border-radius:3px;width:0%;transition:width .4s"></div>
        </div>
        <div id="market-temp-msg" style="font-size:11px;color:var(--text2);font-style:italic;line-height:1.5"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">テーマモメンタム <span class="tag">Δスコア順</span></div>
    <div id="theme-ranking"></div>
  </div>

  <div class="ticker-alert-section" id="alert-section" style="display:none">
    <div class="card-title" style="margin-bottom:8px">要注意 🔵🟣</div>
    <div class="ticker-grid" id="alert-grid"></div>
  </div>

  <div id="ticker-sections"></div>

  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this.files[0]);this.value=''">
  <div class="btn-row">
    <button class="btn btn-export" onclick="exportData()">写本を作成</button>
    <button class="btn btn-export" onclick="document.getElementById('import-file').click()">記録簿を開く</button>
    <button class="btn btn-export" onclick="clearData()" style="color:var(--red)">データリセット</button>
  </div>
  <div id="backup-status" style="display:none;margin-top:8px;font-size:13px;text-align:center;font-style:italic"></div>

  <div class="empty-state" id="empty-state" style="display:none">
    <p style="font-size:32px;margin-bottom:8px">📊</p>
    <p>データがありません</p>
    <p style="margin-top:4px;font-size:13px">「データ入力」からCSVを読み込んでください</p>
  </div>

  <div class="card" id="voyage-log-card">
    <div class="voyage-log-header" onclick="toggleVoyageLog()">
      <div class="card-title" style="margin-bottom:0">航海日誌 <span class="tag">週次記録</span></div>
      <span class="voyage-log-arrow" id="voyage-log-arrow">▶</span>
    </div>
    <div class="voyage-log-body" id="voyage-log-body"></div>
  </div>
</div>

<!-- SCREEN: DATA INPUT -->
<div class="screen" id="screen-input">

  <!-- Step 1: CSV -->
  <div class="card">
    <div class="step-header"><div class="step-num">1</div><div class="step-title">CSVを読み込む</div></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('csv-file').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleFileDrop(event)">
      <input type="file" id="csv-file" accept=".csv" multiple onchange="handleFileSelect(event)">
      <div style="font-size:28px">📂</div>
      <p>タップまたはドラッグ＆ドロップ（複数ファイル一括投入可）<br>楽天証券 日足CSV（Shift_JIS対応）</p>
    </div>
    <div id="csv-status" style="margin-top:8px;font-size:13px;color:var(--text2)"></div>
    <div id="csv-preview"></div>
  </div>

  <!-- Step 2: Theme toggles -->
  <div class="card">
    <div class="step-header"><div class="step-num">2</div><div class="step-title">テーマ判定</div></div>
    <div id="theme-toggles"></div>
  </div>

  <!-- Step 3: Ticker adjustments + memo + save -->
  <div class="card">
    <div class="step-header"><div class="step-num">3</div><div class="step-title">銘柄補正・保存</div></div>
    <div id="ticker-adjustments"></div>
    <div class="divider"></div>
    <div class="form-row" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div class="form-label">本日の空模様</div>
      <div class="toggle-group" id="climate-toggles"></div>
    </div>
    <div class="divider"></div>
    <div class="form-row" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div class="form-label">未来備忘録</div>
      <textarea class="form-input" id="input-memo" placeholder="マイ・ロード、今週の所見を一筆（例: AIの過熱感が気になる、銀行に資金が逃げ始めた 等）"></textarea>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" id="save-btn" onclick="saveWeekData()" disabled>保存する</button>
    <div id="save-status" style="margin-top:8px;font-size:13px;text-align:center"></div>
  </div>

  <!-- Settings: acquired prices -->
  <div class="card">
    <div class="card-title">取得価格設定（撤退シグナル用）</div>
    <div id="acquired-prices"></div>
  </div>
</div>

<!-- MODAL: Ticker detail -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-metrics" id="modal-metrics"></div>
    <div class="chart-wrap"><canvas id="modal-chart" class="chart-canvas"></canvas></div>
    <div class="modal-memo" id="modal-memo" style="display:none"></div>
  </div>
</div>

<!-- POCKET WATCH (dashboard only, position:fixed) -->
<div id="pocket-watch" style="display:none">

// ============================================================
// Module 1: 純粋関数 (副作用なし・テスト可能)
// ============================================================

/** Wilder RSI — period=14, min bars=period+1 */
function calcRSI(closes, period = CONFIG.RSI_PERIOD) {
  if (!closes || closes.length < period + 1) return null;
  // 差分リスト
  const diffs = [];
  for (let i = 1; i < closes.length; i++) diffs.push(closes[i] - closes[i - 1]);
  // 最初のperiod本で初期平均を計算
  let avgGain = 0, avgLoss = 0;
  for (let i = 0; i < period; i++) {
    if (diffs[i] > 0) avgGain += diffs[i];
    else avgLoss += Math.abs(diffs[i]);
  }
  avgGain /= period;
  avgLoss /= period;
  // Wilder平滑化
  for (let i = period; i < diffs.length; i++) {
    const g = diffs[i] > 0 ? diffs[i] : 0;
    const l = diffs[i] < 0 ? Math.abs(diffs[i]) : 0;
    avgGain = (avgGain * (period - 1) + g) / period;
    avgLoss = (avgLoss * (period - 1) + l) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return parseFloat((100 - 100 / (1 + rs)).toFixed(2));
}

/** SMA(n) of closes — min bars=n */
function calcSMA(closes, n) {
  if (!closes || closes.length < n) return null;
  const slice = closes.slice(-n);
  return slice.reduce((a, b) => a + b, 0) / n;
}

/** 75日線乖離率 (%) */
function calcDisparity(close, ma) {
  if (ma == null || ma === 0) return null;
  return parseFloat(((close / ma - 1) * 100).toFixed(2));
}

/** 信用倍率週次変化率 (%) */
function calcCreditChange(cur, prev) {
  if (cur == null || prev == null || prev === 0) return null;
  return parseFloat(((cur / prev - 1) * 100).toFixed(2));
}

/** 決算予定日(YYYY-MM-DD)から今日(ローカル日付基準)までの残り日数 — 過去日はnull */
function calcDaysToEarnings(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  const todayMs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const d = new Date(dateStr + 'T00:00:00');
  const targetMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const diff = Math.round((targetMs - todayMs) / 86400000);
  return diff >= 0 ? diff : null;
}

/**
 * 最終保存日からの経過日数を計算し鮮度レベルを返す（純粋関数・テスト可能）
 * @param {string|null} lastUpdatedISO — ISO日時文字列、またはnull
 * @returns {{ days:number, level:'gold'|'yellow'|'red' }|null}
 */
function calcFreshnessLevel(lastUpdatedISO) {
  if (!lastUpdatedISO) return null;
  const saved = new Date(lastUpdatedISO);
  const today = new Date();
  const savedDay  = new Date(saved.getFullYear(), saved.getMonth(), saved.getDate()).getTime();
  const todayDay  = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const days = Math.max(0, Math.round((todayDay - savedDay) / 86400000));
  if (days <= 3) return { days, level: 'gold'   };
  if (days <= 6) return { days, level: 'yellow' };
  return           { days, level: 'red'    };
}

/**
 * 銘柄のデータ充足度を4段階評価する（純粋関数・テスト可能）
 * 評価項目: RSI算出可 / 75日線乖離算出可 / 信用変化算出可 / 決算予定日入力済
 * @param {{ rsiOk, rsi, ma75Ok, ma75Disparity, creditOk, creditRatioWeekChange, daysToEarnings }} td
 * @returns {{ score:number, level:'excellent'|'good'|'fair'|'poor', label:string }}
 */
function calcDataQuality(td) {
  let score = 0;
  if (td.rsiOk !== false && td.rsi != null)                      score++;
  if (td.ma75Ok !== false && td.ma75Disparity != null)           score++;
  if (td.creditOk !== false && td.creditRatioWeekChange != null) score++;
  if (td.daysToEarnings != null)                                 score++;
  if (score === 4) return { score, level: 'excellent', label: 'Excellent' };
  if (score === 3) return { score, level: 'good',      label: 'Good'      };
  if (score === 2) return { score, level: 'fair',      label: 'Fair'      };
  return            { score, level: 'poor',      label: 'Poor'      };
}

function calcMarketTemperature(avgScore) {
  if (avgScore < 40) return { level: 'cold',   label: '冷徹',   color: '#5C8BA5',
    message: '市場は冷え込んでおります。火室の石炭も静かなものでございますな' };
  if (avgScore < 60) return { level: 'calm',   label: '穏やか', color: '#4E7845',
    message: '市場は落ち着いた呼吸をしております。好機を静かにお待ちくださいませ' };
  if (avgScore < 80) return { level: 'active', label: '活況',   color: '#B5A642',
    message: '市場に熱気が漂い始めております。機関車の汽笛が聞こえますな' };
  return              { level: 'hot',    label: '熱狂',   color: '#C04030',
    message: '市場は沸き立っております。逸る気持ちこそ、最も危うき投資でございます。どうか冷静に' };
}

function calcRsiDelta(curRsi, prevRsi) {
  if (curRsi == null || prevRsi == null) return null;
  return Math.round((curRsi - prevRsi) * 10) / 10;
}

function calcRsiDeltaAdj(rsi, rsiDelta) {
  if (rsi == null || rsiDelta == null) return 0;
  if (rsiDelta >= 15 && rsi >= 70) return -10;
  if (rsiDelta >= 10 && rsi >= 70) return -5;
  return 0;
}

/**
 * テーマスコア (0–100)
 * @param {string} toggle '熱狂'|'流入'|'中立'|'流出'
 * @param {string[]} consensusItems 所属銘柄のコンセンサス配列 '上方修正'|'据置'|'下方修正'
 */
function calcThemeScore(toggle, consensusItems) {
  const baseMap = { '熱狂': 80, '流入': 60, '中立': 40, '流出': 0 };
  const base = baseMap[toggle] ?? 40;
  const scoreMap = { '上方修正': 20, '据置': 10, '下方修正': 0 };
  let bonus = 0;
  if (consensusItems && consensusItems.length > 0) {
    bonus = consensusItems.reduce((s, c) => s + (scoreMap[c] ?? 10), 0) / consensusItems.length;
  }
  return Math.min(100, Math.round(base + bonus));
}

/**
 * 銘柄個別スコア (0–100)
 * @param {{ rsi, ma75Disparity, creditRatioWeekChange, daysToEarnings }} m
 */
function calcTickerScore(m) {
  let rsiScore = 0;
  if (m.rsi != null) {
    if (m.rsi < 35) rsiScore = 30;
    else if (m.rsi < 45) rsiScore = 20;
    else if (m.rsi < 55) rsiScore = 10;
  }
  let dispScore = 0;
  if (m.ma75Disparity != null) {
    if (m.ma75Disparity < -15) dispScore = 30;
    else if (m.ma75Disparity < -5) dispScore = 20;
    else if (m.ma75Disparity < 0) dispScore = 10;
  }
  let creditScore = 0;
  if (m.creditRatioWeekChange != null) {
    if (m.creditRatioWeekChange <= -10) creditScore = 15;
    else if (m.creditRatioWeekChange < 10) creditScore = 5;
  }
  // null(未設定)=「当面決算リスクなし」とみなし満点(+25)、直前リスク減点なし
  let earningsScore = 25;
  const dte = m.daysToEarnings;
  if (dte != null) {
    if (dte >= 15) earningsScore = 25;
    else if (dte >= 8) earningsScore = 10;
    else earningsScore = 0; // <=7日: 直前リスク
  }
  let finalScore = rsiScore + dispScore + creditScore + earningsScore;
  if (dte != null && dte <= 7) finalScore -= 20;
  const rsiDeltaAdj = calcRsiDeltaAdj(m.rsi, m.rsiDelta ?? null);
  if (rsiDeltaAdj !== 0) console.debug(`[ΔRSI adj] ${m.rsiDelta >= 0 ? '+' : ''}${m.rsiDelta} → ${rsiDeltaAdj}点`);
  return Math.max(0, Math.min(100, finalScore + rsiDeltaAdj));
}

/**
 * シグナル判定 (優先順位: purple > blue > red > yellow > white)
 * @param {{ tickerScore, themeScore, rsi, ma75Disparity, consensus, acquiredPrice, currentClose }} ctx
 */
function classifySignal(ctx) {
  const { tickerScore, themeScore, rsi, ma75Disparity, consensus, acquiredPrice, currentClose } = ctx;
  // 1. Purple: 下方修正 OR 損益 <= -12%
  if (consensus === '下方修正') return 'purple';
  if (acquiredPrice != null && currentClose != null && acquiredPrice > 0) {
    if ((currentClose / acquiredPrice - 1) * 100 <= -12) return 'purple';
  }
  // 2. Blue: RSI >= 75 AND 乖離 >= +20%、またはΔRSI急騰(+15以上)かつ高RSI(70以上)
  if (rsi != null && rsi >= 75 && ma75Disparity != null && ma75Disparity >= 20) return 'blue';
  if (rsi != null && rsi >= 70 && ctx.rsiDelta != null && ctx.rsiDelta >= 15) return 'blue';
  // 3. Red: theme >= 70 AND ticker >= 75 AND consensus != 下方修正
  if (themeScore >= 70 && tickerScore >= 75 && consensus !== '下方修正') return 'red';
  // 4. Yellow: theme >= 60 AND 65 <= ticker <= 74
  if (themeScore >= 60 && tickerScore >= 65 && tickerScore <= 74) return 'yellow';
  return 'white';
}

/** テーマIDから「地盤」(暴落耐性)値を取得。未定義は null */
function getGroundValue(themeId) {
  const theme = CONFIG.THEMES.find(t => t.id === themeId);
  if (!theme) return null;
  const v = CONFIG.GROUND[theme.name];
  return v != null ? v : null;
}

/** 本日の空模様による個別スコアへの補正値。嵐の時のみ作動し、テーマスコア・各配点には影響しない */
function calcClimateAdj(climate, groundValue) {
  if (climate !== 'storm') return 0;
  if (groundValue == null) return 0;
  const adj = CONFIG.STORM_ADJ_BY_GROUND[groundValue];
  return adj != null ? adj : 0;
}

/** 個別スコアへ空模様補正を適用し0-100にクランプする後段補正（純粋関数） */
function applyClimateAdj(tickerScore, climateAdj) {
  return Math.max(0, Math.min(100, tickerScore + climateAdj));
}

/** 理由テキスト自動生成 (red シグナル用) */
function buildRedReason(code, themeId, rsi, ma75Disparity) {
  const themeName = CONFIG.THEMES.find(t => t.id === themeId)?.name || themeId;
  const parts = [];
  parts.push(`[${themeName}] に資金流入中`);
  if (rsi != null && rsi < 45) parts.push(`RSI${Math.round(rsi)} の売られすぎ`);
  if (ma75Disparity != null && ma75Disparity < -5) parts.push(`75日線 ${ma75Disparity.toFixed(1)}% 乖離`);
  return '買い理由: ' + parts.join(' ＆ ');
}

function generateLadyComment(t) {
  const rsi  = (t.td.rsiOk  !== false && t.td.rsi  != null) ? t.td.rsi  : null;
  const disp = (t.td.ma75Ok !== false && t.td.ma75Disparity != null) ? t.td.ma75Disparity : null;
  const cred = (t.td.creditOk !== false && t.td.creditRatioWeekChange != null) ? t.td.creditRatioWeekChange : null;
  const dte  = t.td.daysToEarnings; // null=未設定、数値=残り日数

  const rF = rsi  != null ? fmt(rsi)  : null;
  const dF = disp != null ? (disp >= 0 ? '+' : '') + fmt(disp) + '%' : null;

  // Part1: RSI・乖離による状況判断
  let p1;
  if (rsi != null && disp != null) {
    if (rsi >= 75 && disp >= 20) {
      p1 = `RSIは${rF}、75日線より${dF}の高みにございます。少々のぼせ上がっておられるご様子……高値掴みには、どうかご用心なさいませ`;
    } else if (rsi >= 70 || disp >= 15) {
      p1 = `RSI${rF}、乖離${dF}と、やや熱を帯びてまいりました。ご用心のほどを`;
    } else if (rsi < 35 && disp < -15) {
      p1 = `RSI${rF}、乖離${dF}……ずいぶんと売り込まれておりますな。テーマに資金が向けば、見直される目もございましょう`;
    } else if (rsi < 35 || disp < -10) {
      p1 = `RSI${rF}、乖離${dF}と、売られすぎの域に入っております`;
    } else if (rsi < 45 && disp < -5) {
      p1 = `RSI${rF}、乖離${dF}とやや出遅れの様相でございます`;
    } else {
      p1 = `RSI${rF}、75日線乖離${dF}と、いずれも中庸の域でございます`;
    }
  } else if (rsi != null) {
    if (rsi >= 70)  p1 = `RSI${rF}と、かなりの過熱感にございます。ご用心なさいませ`;
    else if (rsi < 35) p1 = `RSI${rF}と、売られすぎの域でございます`;
    else            p1 = `RSI${rF}と、中程度の水準でございます`;
  } else if (disp != null) {
    if (disp >= 15)  p1 = `75日線から${dF}と、かなり乖離してございます。ご用心のほど`;
    else if (disp < -10) p1 = `75日線から${dF}と、大きく売り込まれておりますな`;
    else             p1 = `75日線乖離は${dF}でございます`;
  } else {
    p1 = `数値データはまだ揃っておりません`;
  }

  // ΔRSI急騰警告（前週比+15以上かつRSI70以上で過熱加速）
  const rsiDelta = t.rsiDelta ?? null;
  if (rsiDelta != null && rsiDelta >= 15 && rsi != null && rsi >= 70) {
    p1 += `　RSIが週間で${rsiDelta >= 0 ? '+' : ''}${fmt(rsiDelta)}と急騰しております。バンドウォークの兆し、いっそうのご用心を`;
  }

  // Part2: 決算・信用（最急のもの1件）
  let p2 = '';
  if (dte != null && dte <= 7) {
    p2 = `まもなく決算発表のお時間でございます。数字次第で大きく振れますゆえ、お覚悟を`;
  } else if (dte != null && dte <= 14) {
    p2 = `決算まで残り${dte}日、そろそろお時間が迫ってまいります`;
  } else if (cred != null && cred <= -10) {
    p2 = `信用倍率の整理が進んでおりますな。需給は軽くなりつつあるご様子でございます`;
  } else if (cred != null && cred >= 10) {
    p2 = `信用倍率が上昇しております。需給面では少々の重さが感じられますな`;
  }

  return p1 + (p2 ? '　' + p2 : '');
}

/** 週ID: CSV最新日が属する週の金曜日 (YYYY-MM-DD)
 *  注意: toISOString() は UTC 変換されるため JST(+9) 環境では日付がズレる。
 *  getFullYear/getMonth/getDate でローカル日付を組み立てる。
 */
function getWeekId(dateStr) {
  const d = new Date(dateStr + 'T00:00:00'); // ローカル時刻として解釈
  const day = d.getDay(); // 0=Sun, 1=Mon, ..., 5=Fri, 6=Sat
  const friday = new Date(d);
  if (day === 6)      friday.setDate(d.getDate() - 1);      // Sat → 前Fri
  else if (day === 0) friday.setDate(d.getDate() - 2);      // Sun → 前Fri
  else                friday.setDate(d.getDate() + (5 - day)); // Mon-Fri → 当週Fri
  // ローカル日付で文字列化（toISOString はUTC変換でJST環境では1日ズレる）
  const y  = friday.getFullYear();
  const m  = String(friday.getMonth() + 1).padStart(2, '0');
  const dd = String(friday.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

/** 数値フォーマット */
function fmt(v, dec = 1) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(dec);
}
function fmtNum(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('ja-JP');
}

// ============================================================
// Module 2: CSVパーサ (楽天日足 Shift_JIS 対応)
// ============================================================

async function readFileBuffer(file) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = e => res(e.target.result);
    fr.onerror = rej;
    fr.readAsArrayBuffer(file);
  });
}

function decodeBuffer(buf) {
  const bytes = new Uint8Array(buf);
  // BOM付きUTF-8 (EF BB BF)
  if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
    return new TextDecoder('utf-8').decode(buf);
  }
  // Shift_JIS (CP932) を試みる
  try {
    return new TextDecoder('shift_jis').decode(buf);
  } catch (_) {
    return new TextDecoder('utf-8').decode(buf);
  }
}

/** CSV1行をフィールド配列に分割 (ダブルクォート対応) */
function splitCSVLine(line) {
  const result = [];
  let inQ = false, field = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(field.trim()); field = ''; }
    else { field += c; }
  }
  result.push(field.trim());
  return result;
}

/** 日付文字列を YYYY-MM-DD に正規化 */
function normalizeDate(s) {
  const m = s.replace(/\s/g, '').match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (!m) return null;
  return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
}

/** 数値文字列をパース (桁区切りカンマ・全角数字除去) */
function parseNum(s) {
  if (!s) return NaN;
  const clean = String(s)
    .replace(/,/g, '')
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .trim();
  return Number(clean);
}

/** CSVテキストを解析して行オブジェクト配列を返す */
function parseCSVText(text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  let headers = [];

  // 「日付」を含む行をヘッダとして検出
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('日付')) {
      headerIdx = i;
      headers = splitCSVLine(lines[i]);
      break;
    }
  }
  if (headerIdx === -1) return { error: 'ヘッダ行（日付）が見つかりません', rows: [], errors: [] };

  const idxDate   = headers.findIndex(h => h.includes('日付'));
  const idxClose  = headers.findIndex(h => h.includes('終値'));
  const idxVol    = headers.findIndex(h => h.includes('出来高'));
  // 信用倍率 — 列名を複数パターンで検出（楽天証券CSV: 融資残高/貸株残高/貸借倍率）
  const idxBuy    = headers.findIndex(h => h.includes('信用買残'));
  const idxSell   = headers.findIndex(h => h.includes('信用売残'));
  const idxFuushi = headers.findIndex(h => h.includes('融資残高'));  // 楽天: 信用買残相当
  const idxKashi  = headers.findIndex(h => h.includes('貸株残高'));  // 楽天: 信用売残相当
  const idxRatio  = headers.findIndex(h => h.includes('貸借倍率'));  // 楽天: 倍率直接値

  if (idxDate < 0 || idxClose < 0) {
    return { error: '必須列（日付・終値）が見つかりません', rows: [], errors: [] };
  }

  const rows = [], errors = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = splitCSVLine(line);

    const dateStr = cols[idxDate] || '';
    const closeStr = cols[idxClose] || '';
    const date = normalizeDate(dateStr);
    if (!date) {
      errors.push({ line: i + 1, reason: `日付形式不正: "${dateStr}"` });
      continue;
    }
    const close = parseNum(closeStr);
    if (isNaN(close) || close <= 0) {
      errors.push({ line: i + 1, reason: `終値不正: "${closeStr}"` });
      continue;
    }
    const row = { date, close };
    // 信用倍率 — 空でも行を捨てない（タイムラグ考慮: 最新の有効値を後で採用）
    // 優先順位: 信用買残/売残 → 貸借倍率(既計算値) → 融資残高/貸株残高(範囲検証付き)
    // 楽天CSVは融資/貸株が異なる単位の場合があるため貸借倍率を優先し、>100は異常値として除外
    let creditRatioVal = null;
    if (idxBuy >= 0 && idxSell >= 0) {
      const buy = parseNum(cols[idxBuy] || '');
      const sell = parseNum(cols[idxSell] || '');
      if (!isNaN(buy) && !isNaN(sell) && buy > 0 && sell > 0) {
        row.creditBuy = buy; row.creditSell = sell;
        creditRatioVal = buy / sell;
      }
    }
    if (creditRatioVal == null && idxRatio >= 0) {
      const ratio = parseNum(cols[idxRatio] || '');
      if (!isNaN(ratio) && ratio > 0 && ratio <= 100) creditRatioVal = ratio;
    }
    if (creditRatioVal == null && idxFuushi >= 0 && idxKashi >= 0) {
      const fuushi = parseNum(cols[idxFuushi] || '');
      const kashi  = parseNum(cols[idxKashi]  || '');
      if (!isNaN(fuushi) && !isNaN(kashi) && fuushi > 0 && kashi > 0) {
        const computed = fuushi / kashi;
        if (computed <= 100) { row.creditBuy = fuushi; row.creditSell = kashi; creditRatioVal = computed; }
      }
    }
    if (creditRatioVal != null) row.creditRatio = creditRatioVal;
    rows.push(row);
  }

  // 日付昇順ソート
  rows.sort((a, b) => a.date.localeCompare(b.date));
  return { rows, errors, error: null };
}

/** rows から指標を算出 */
function computeIndicators(rows, prevCreditRatio) {
  const closes = rows.map(r => r.close);
  const n = closes.length;

  const rsiOk = n >= CONFIG.RSI_PERIOD + 1;
  const rsi = rsiOk ? calcRSI(closes) : null;

  const ma75Ok = n >= CONFIG.MA_PERIOD;
  const ma75 = ma75Ok ? calcSMA(closes, CONFIG.MA_PERIOD) : null;
  const latestClose = closes[n - 1];
  const ma75Disparity = (ma75Ok && ma75) ? calcDisparity(latestClose, ma75) : null;

  // 最新と直前の信用倍率をCSV内から取得（週次比較はCSV内完結を優先、不足時はlocalStorage前週値）
  let creditRatio = null, prevCreditRatioFromCsv = null;
  let creditOk = false, foundCount = 0;
  for (let i = rows.length - 1; i >= 0 && foundCount < 2; i--) {
    if (rows[i].creditRatio != null) {
      if (foundCount === 0) { creditRatio = rows[i].creditRatio; creditOk = true; }
      else                  { prevCreditRatioFromCsv = rows[i].creditRatio; }
      foundCount++;
    }
  }
  const basePrev = prevCreditRatioFromCsv ?? prevCreditRatio;
  let creditRatioWeekChange = (creditOk && basePrev != null)
    ? calcCreditChange(creditRatio, basePrev) : null;
  if (creditRatioWeekChange != null) {
    creditRatioWeekChange = Math.max(-100, Math.min(100, creditRatioWeekChange));
  }

  const latestDate = rows[n - 1].date;
  return {
    weekId: getWeekId(latestDate),
    latestDate, close: latestClose,
    rsi, rsiOk,
    ma75, ma75Ok, ma75Disparity,
    creditRatio, creditOk, creditRatioWeekChange,
    bars: n,
  };
}

// ============================================================
// Module 3: LocalStorage管理
// ============================================================

function lsGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(_) { return null; }
}

function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e) {
    showLsError();
    return false;
  }
}

function showLsError() {
  alert('LocalStorage への書き込みに失敗しました。\nプライベートモードまたはストレージ容量超過の可能性があります。\nJSONエクスポートでデータをバックアップしてください。');
}

function getWeeks() { return lsGet(CONFIG.LS_WEEKS) || {}; }
function getMeta()  { return lsGet(CONFIG.LS_META)  || {}; }
function getSettings() {
  const s = lsGet(CONFIG.LS_SETTINGS) || {};
  return { userAcquiredPrices: {}, earningsDates: {}, ...s };
}

/** 保存済み週IDを昇順で返す */
function getSortedWeekIds() {
  return Object.keys(getWeeks()).sort();
}

/** 航海日誌: 保存済み週を新しい順に並べ、空模様・備忘録を整形して返す */
function buildVoyageLogEntries(weeks, ids) {
  return ids.slice().sort().reverse().map(weekId => {
    const w = weeks[weekId] || {};
    const climateOpt = CONFIG.CLIMATE_OPTIONS.find(c => c.id === w.climate);
    return {
      weekId,
      climateText: climateOpt ? `${climateOpt.emoji} ${climateOpt.label}` : '記録なし',
      memoText: w.memo ? w.memo : '所見の記載なし',
    };
  });
}

/** 指定weekIdの直前の保存済みweekIdを返す */
function getPrevWeekId(weekId) {
  const ids = getSortedWeekIds();
  const idx = ids.indexOf(weekId);
  if (idx > 0) return ids[idx - 1];
  // weekIdがまだ保存されていない場合は末尾
  const before = ids.filter(id => id < weekId);
  return before.length ? before[before.length - 1] : null;
}

/** 週データ保存 + 52週FIFOクリーン */
function saveWeek(weekId, data) {
  const weeks = getWeeks();
  weeks[weekId] = { ...data, _savedAt: new Date().toISOString() };
  // 52週超過分を削除
  const ids = Object.keys(weeks).sort();
  while (ids.length > CONFIG.HISTORY_MAX_WEEKS) {
    delete weeks[ids.shift()];
  }
  return lsSet(CONFIG.LS_WEEKS, weeks);
}

function saveMeta(m) {
  return lsSet(CONFIG.LS_META, { ...getMeta(), ...m, version: CONFIG.SCHEMA_VERSION });
}

function saveSettings(s) { return lsSet(CONFIG.LS_SETTINGS, s); }

/* ------- POCKET WATCH ------- */
function renderPocketWatch() {
  const el = document.getElementById('pocket-watch');
  if (!el) return;
  el.style.display = '';

  const meta = getMeta();
  const freshness = calcFreshnessLevel(meta.lastUpdated || null);

  const colorMap = { gold: '#B5A642', yellow: '#D4A017', red: '#C04030' };
  const handColor = freshness ? colorMap[freshness.level] : '#58584C';

  let tooltipText;
  if (!freshness) {
    tooltipText = 'まだ一度も記帳がございません';
  } else if (freshness.level === 'gold') {
    tooltipText = freshness.days === 0
      ? '記録は最新でございます。よき塩梅かと'
      : `最終点検より${freshness.days}日。記録は新鮮でございます`;
  } else if (freshness.level === 'yellow') {
    tooltipText = `最終点検より${freshness.days}日。そろそろ新たな電信を受信なさってはいかがでしょう`;
  } else {
    tooltipText = `最終点検より${freshness.days}日が経過。針も赤に。どうかネジを巻き直しなさいませ`;
  }

  const ttEl = document.getElementById('watch-tooltip-text');
  if (ttEl) ttEl.textContent = tooltipText;

  ['watch-hand-h', 'watch-hand-m'].forEach(id => {
    const e = document.getElementById(id);
    if (e) e.setAttribute('stroke', handColor);
  });
  const ctr = document.getElementById('watch-center');
  if (ctr) ctr.setAttribute('fill', handColor);

  const handsGroup = document.getElementById('watch-hands');
  if (handsGroup) handsGroup.style.display = freshness ? '' : 'none';
}

function showWatchTooltip() {
  document.getElementById('watch-tooltip').style.display = 'block';
  _watchTooltipVisible = true;
}
function hideWatchTooltip() {
  document.getElementById('watch-tooltip').style.display = 'none';
  _watchTooltipVisible = false;
}
function toggleWatchTooltip() {
  if (_watchTooltipVisible) hideWatchTooltip(); else showWatchTooltip();
}

/* ------- NAVIGATE ------- */
function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('nav-' + screen).classList.add('active');

  if (watchEl) watchEl.style.display = screen === 'dashboard' ? '' : 'none';
  hideWatchTooltip();
  if (screen === 'dashboard') renderDashboard();
  if (screen === 'input')     renderInputScreen();
}

/* ------- SAVE INFO BANNER ------- */
function updateSaveInfoBanner() {
  const bannerEl = document.getElementById('save-info-banner');
  if (!bannerEl) return;
  const meta = getMeta();
  if (meta.lastUpdated && meta.enteredBy === 'user') {
    const d = new Date(meta.lastUpdated);
    const ts = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    bannerEl.style.display = 'block';
  } else {
    bannerEl.style.display = 'none';
  }
}

/* ------- MARKET TEMPERATURE ------- */
function renderMarketTemperature(themeData) {
  const card = document.getElementById('market-temp-card');
  if (!card) return;
  if (!themeData || themeData.length === 0) { card.style.display = 'none'; return; }
  const avg = Math.round(themeData.reduce((s, td) => s + td.score, 0) / themeData.length);
  const temp = calcMarketTemperature(avg);
  card.style.display = '';
  document.getElementById('market-temp-label').textContent = temp.label;
  document.getElementById('market-temp-label').style.color = temp.color;
  document.getElementById('market-temp-score').textContent = `(平均スコア ${avg})`;
  document.getElementById('market-temp-bar-fill').style.width      = `${avg}%`;
  document.getElementById('market-temp-bar-fill').style.background = temp.color;
  document.getElementById('market-temp-msg').textContent = temp.message;
  const fillH = Math.round((avg / 100) * 46);
  const fillY = 50 - fillH;
  const ft = document.getElementById('thermo-fill-tube');
  if (ft) { ft.setAttribute('y', String(fillY)); ft.setAttribute('height', String(Math.max(0, fillH))); ft.setAttribute('fill', temp.color); }
  const fb = document.getElementById('thermo-fill-bulb');
  if (fb) fb.setAttribute('fill', temp.color);
}

function renderDashboard() {
  const weeks = getWeeks();
  const ids = getSortedWeekIds();
  updateSaveInfoBanner();
  renderPocketWatch();
  renderVoyageLog();
  if (ids.length === 0) {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('theme-ranking').innerHTML = '';
    document.getElementById('ticker-sections').innerHTML = '';
    document.getElementById('alert-section').style.display = 'none';
    document.getElementById('memo-banner').style.display = 'none';
    document.getElementById('climate-banner').style.display = 'none';
    const mtCard = document.getElementById('market-temp-card');
    if (mtCard) mtCard.style.display = 'none';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  const latestId = ids[ids.length - 1];
  const curWeek = weeks[latestId];
  const prevId = ids.length > 1 ? ids[ids.length - 2] : null;
  const prevWeek = prevId ? weeks[prevId] : null;
  const settings = getSettings();

  // 本日の空模様
  const climate = curWeek.climate || CONFIG.CLIMATE_DEFAULT;
  const climateOpt = CONFIG.CLIMATE_OPTIONS.find(c => c.id === climate)
    || CONFIG.CLIMATE_OPTIONS.find(c => c.id === CONFIG.CLIMATE_DEFAULT);
  document.getElementById('climate-banner').style.display = 'block';
  document.getElementById('climate-text').textContent = climate === 'storm'
    ? `${climateOpt.emoji} ${climateOpt.label} — 本日は荒天にございます。地盤の弱きセクターには、いっそうの慎重さを`
    : `${climateOpt.emoji} ${climateOpt.label}`;

  // 未来備忘録
  document.getElementById('memo-banner').style.display = 'block';
  document.getElementById('memo-text').textContent = curWeek.memo
    ? curWeek.memo
    : 'マイ・ロード、本日の所見はまだ承っておりません';

  // Compute theme scores
  const themeData = computeThemeData(curWeek, prevWeek);
  renderMarketTemperature(themeData);

  // Sort by Δスコア (降順)、同値は絶対スコア降順
  themeData.sort((a, b) => {
    const dd = b.delta - a.delta;
    if (dd !== 0) return dd;
    return b.score - a.score;
  });

  renderThemeRanking(themeData);
  renderTickerBoard(latestId, weeks, settings);
}

function computeThemeData(curWeek, prevWeek) {
  return CONFIG.THEMES.map(theme => {
    const td = curWeek.themes?.[theme.id] || {};
    const toggle = td.toggle || '中立';
    const consensusItems = theme.tickers.map(code => curWeek.tickers?.[code]?.consensus || '据置');
    const score = calcThemeScore(toggle, consensusItems);

    let prevScore = null, delta = 0;
    if (prevWeek) {
      const ptd = prevWeek.themes?.[theme.id] || {};
      const prevToggle = ptd.toggle || '中立';
      const prevConsensus = theme.tickers.map(code => prevWeek.tickers?.[code]?.consensus || '据置');
      prevScore = calcThemeScore(prevToggle, prevConsensus);
      delta = score - prevScore;
    }
    return { theme, toggle, score, prevScore, delta, leadingValue: td.leadingValue };
  });
}

function renderThemeRanking(themeData) {
  const toggleColorMap = { '熱狂':'badge-enthu','流入':'badge-inflow','中立':'badge-neutral','流出':'badge-outflow' };
  const html = themeData.map(td => {
    const cls = toggleColorMap[td.toggle] || 'badge-neutral';
    const deltaStr = td.delta > 0 ? `▲${td.delta}` : td.delta < 0 ? `▼${Math.abs(td.delta)}` : '±0';
    const deltaCls = td.delta > 0 ? 'delta-pos' : td.delta < 0 ? 'delta-neg' : 'delta-zero';
    const barColor = { '熱狂':'var(--red)','流入':'var(--yellow)','中立':'var(--white)','流出':'var(--blue)' }[td.toggle] || 'var(--white)';
    const leading = td.leadingValue
      ? `<span class="theme-leading">(${td.theme.leadingLabel}: ${Number(td.leadingValue).toLocaleString('ja-JP')})</span>` : '';
    return `<div class="theme-row" onclick="scrollToTheme('${td.theme.id}')">
      <span class="theme-badge ${cls}">${td.toggle}</span>
      <div style="flex:1">
        <div class="theme-name">${td.theme.name}${leading}</div>
        <div class="theme-bar-wrap" style="margin-top:4px">
          <div class="theme-bar-fill" style="width:${td.score}%;background:${barColor}"></div>
        </div>
      </div>
      <div class="theme-meta">
        <div style="font-size:16px;font-weight:800">${td.score}</div>
        <div class="${deltaCls}">${deltaStr}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('theme-ranking').innerHTML = html;
}

function scrollToTheme(themeId) {
  const el = document.getElementById('theme-section-' + themeId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderTickerBoard(latestId, weeks, settings) {
  const curWeek = weeks[latestId];
  const ids = getSortedWeekIds();
  const prevId = ids.length > 1 ? ids[ids.length - 2] : null;
  const prevWeek = prevId ? weeks[prevId] : null;

  // テーマスコアを事前計算
  const themeScores = {};
  const themeData = computeThemeData(curWeek, prevWeek);
  themeData.forEach(td => { themeScores[td.theme.id] = td.score; });

  // 本日の空模様（嵐の時のみ、各銘柄の最終スコアに後段補正を適用。テーマスコア・各配点には影響しない）
  const climate = curWeek.climate || CONFIG.CLIMATE_DEFAULT;

  // 各銘柄のシグナル・スコアを計算
  const tickerResults = [];
  Object.entries(CONFIG.TICKERS).forEach(([code, info]) => {
    const td = curWeek.tickers?.[code] || {};
    const prevTd = prevWeek ? (prevWeek.tickers?.[code] || {}) : null;
    const themeScore = themeScores[info.theme] || 0;
    const rsiDelta = calcRsiDelta(td.rsi ?? null, prevTd?.rsi ?? null);
    const metrics = {
      rsi: td.rsi ?? null,
      ma75Disparity: td.ma75Disparity ?? null,
      creditRatioWeekChange: td.creditRatioWeekChange ?? null,
      daysToEarnings: td.daysToEarnings ?? null,
      rsiDelta,
    };
    const tickerScore = calcTickerScore(metrics);
    const groundValue = getGroundValue(info.theme);
    const climateAdj = calcClimateAdj(climate, groundValue);
    const finalScore = applyClimateAdj(tickerScore, climateAdj);
    const signal = classifySignal({
      tickerScore: finalScore, themeScore,
      rsi: td.rsi ?? null,
      ma75Disparity: td.ma75Disparity ?? null,
      consensus: td.consensus || '据置',
      acquiredPrice: settings.userAcquiredPrices?.[code] ?? null,
      currentClose: td.close ?? null,
      rsiDelta,
    });
    tickerResults.push({ code, info, td, themeScore, tickerScore, climateAdj, finalScore, signal, metrics, rsiDelta });
  });

  // alert section (blue/purple)
  const alerts = tickerResults.filter(t => t.signal === 'blue' || t.signal === 'purple');
  const alertSection = document.getElementById('alert-section');
  if (alerts.length > 0) {
    alertSection.style.display = 'block';
    document.getElementById('alert-grid').innerHTML = alerts.map(t => tickerCardHTML(t)).join('');
  } else {
    alertSection.style.display = 'none';
  }

  // テーマごとにグループ化して表示
  const signalOrder = { red: 0, yellow: 1, white: 2, blue: 3, purple: 4 };
  const sectionsHTML = CONFIG.THEMES.map(theme => {
    const tickers = tickerResults
      .filter(t => t.info.theme === theme.id)
      .sort((a, b) => (signalOrder[a.signal] ?? 5) - (signalOrder[b.signal] ?? 5));
    const td = curWeek.themes?.[theme.id] || {};
    const leading = td.leadingValue
      ? ` <span style="font-size:11px;color:var(--yellow)">(${theme.leadingLabel}: ${Number(td.leadingValue).toLocaleString('ja-JP')})</span>` : '';
    return `<div id="theme-section-${theme.id}" style="margin-bottom:16px">
      <div class="section-label">${theme.name}${leading}</div>
      <div class="ticker-grid">${tickers.map(t => tickerCardHTML(t)).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('ticker-sections').innerHTML = sectionsHTML;
}

function tickerCardHTML(t) {
  const sm = CONFIG.SIGNAL_META[t.signal];
  const rsiStr = t.td.rsiOk === false ? '—' : fmt(t.td.rsi);
  const rsiDelta = t.rsiDelta ?? null;
  const rsiDeltaStr = rsiDelta != null
    ? ` <span style="font-size:9px;color:${rsiDelta >= 15 ? '#C04030' : rsiDelta >= 5 ? '#B5A642' : rsiDelta <= -15 ? '#5C8BA5' : 'var(--text2)'}">(前週比 ${rsiDelta >= 0 ? '+' : ''}${fmt(rsiDelta)})</span>`
    : '';
  const dispStr = t.td.ma75Ok === false ? '—' : fmt(t.td.ma75Disparity);
  const credStr = t.td.creditOk === false ? '—' : (t.td.creditRatioWeekChange != null ? fmt(t.td.creditRatioWeekChange) + '%' : '—');
  const dteStr = t.td.daysToEarnings != null ? t.td.daysToEarnings + '日' : '—';
  const dq = calcDataQuality(t.td);
  const dqWarn = (dq.level === 'fair' || dq.level === 'poor')
    ? `<div class="dq-warn">この銘柄、資料が一部欠けております。判断は割り引いてご覧くださいませ</div>`
    : '';
  let reason = '';
  if (t.signal === 'red') {
    reason = `<div class="ticker-reason">${buildRedReason(t.code, t.info.theme, t.td.rsi, t.td.ma75Disparity)}</div>`;
  }
  const climateAdjStr = t.climateAdj
    ? `<div style="font-size:10px;color:var(--text2);margin-top:-4px;margin-bottom:4px">${t.tickerScore} →（⛈空模様補正 ${t.climateAdj > 0 ? '+' : ''}${t.climateAdj}）→ ${t.finalScore}</div>`
    : '';
  return `<div class="ticker-card ${sm.cls}" onclick="openModal('${t.code}')">
    <div class="ticker-sig">${sm.emoji} ${sm.label}</div>
    <div class="ticker-name">${t.info.name} <span class="dq-badge dq-${dq.level}">${dq.label}</span></div>
    <div class="ticker-code">${t.code}</div>
    <div class="ticker-score">${t.finalScore}</div>
    ${climateAdjStr}
    <div class="ticker-metrics">
      RSI <b>${rsiStr}</b>${rsiDeltaStr} | 乖離 <b>${dispStr}%</b><br>
      信用変化 <b>${credStr}</b> | 決算 <b>${dteStr}</b>
    </div>
    ${dqWarn}<div class="ticker-comment">${generateLadyComment(t)}</div>
    ${reason}
  </div>`;
}

/* ------- MODAL ------- */
function openModal(code) {
  const weeks = getWeeks();
  const ids = getSortedWeekIds();
  if (ids.length === 0) return;
  const latestId = ids[ids.length - 1];
  const curWeek = weeks[latestId];
  const td = curWeek.tickers?.[code] || {};
  const info = CONFIG.TICKERS[code];
  const settings = getSettings();
  const themeData = computeThemeData(curWeek, null);
  const themeScore = themeData.find(t => t.theme.id === info.theme)?.score || 0;
  const metrics = {
    rsi: td.rsi ?? null,
    ma75Disparity: td.ma75Disparity ?? null,
    creditRatioWeekChange: td.creditRatioWeekChange ?? null,
    daysToEarnings: td.daysToEarnings ?? null,
  };
  const tickerScore = calcTickerScore(metrics);
  const climate = curWeek.climate || CONFIG.CLIMATE_DEFAULT;
  const groundValue = getGroundValue(info.theme);
  const climateAdj = calcClimateAdj(climate, groundValue);
  const finalScore = applyClimateAdj(tickerScore, climateAdj);
  const signal = classifySignal({
    tickerScore: finalScore, themeScore,
    rsi: td.rsi ?? null, ma75Disparity: td.ma75Disparity ?? null,
    consensus: td.consensus || '据置',
    acquiredPrice: settings.userAcquiredPrices?.[code] ?? null,
    currentClose: td.close ?? null,
  });
  const sm = CONFIG.SIGNAL_META[signal];

  document.getElementById('modal-title').textContent = `${info.name} (${code})`;
  const scoreText = climateAdj
    ? `${tickerScore} →（⛈空模様補正 ${climateAdj > 0 ? '+' : ''}${climateAdj}）→ ${finalScore}`
    : `${finalScore}`;
  document.getElementById('modal-subtitle').textContent =
    `${sm.emoji} ${sm.label} | テーマスコア: ${themeScore} | 個別スコア: ${scoreText}`;

  document.getElementById('modal-metrics').innerHTML = [
    ['RSI', td.rsiOk === false ? '—' : fmt(td.rsi)],
    ['75日線乖離', td.ma75Ok === false ? '—' : fmt(td.ma75Disparity) + '%'],
    ['信用変化', td.creditOk === false ? '—' : (td.creditRatioWeekChange != null ? fmt(td.creditRatioWeekChange) + '%' : '—')],
    ['決算まで', td.daysToEarnings != null ? td.daysToEarnings + '日' : '—'],
    ['終値', td.close != null ? fmtNum(td.close) : '—'],
    ['コンセンサス', td.consensus || '—'],
  ].map(([l, v]) => `<div class="metric-box"><label>${l}</label><value>${v}</value></div>`).join('');

  // 過去12週のスコア推移チャート
  const hist = ids.slice(-12);
  const labels = hist.map(id => id.slice(5)); // MM-DD
  const scoreHist = hist.map(id => {
    const w = weeks[id];
    if (!w || !w.tickers?.[code]) return null;
    const wtd = w.tickers[code];
    const wScore = calcTickerScore({
      rsi: wtd.rsi ?? null,
      ma75Disparity: wtd.ma75Disparity ?? null,
      creditRatioWeekChange: wtd.creditRatioWeekChange ?? null,
      daysToEarnings: wtd.daysToEarnings ?? null,
    });
    const wClimateAdj = calcClimateAdj(w.climate || CONFIG.CLIMATE_DEFAULT, groundValue);
    return applyClimateAdj(wScore, wClimateAdj);
  });
  const rsiHist = hist.map(id => {
    const w = weeks[id];
    return w?.tickers?.[code]?.rsi ?? null;
  });

  if (_modalChart) { _modalChart.destroy(); _modalChart = null; }
  const canvas = document.getElementById('modal-chart');
  _modalChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '個別スコア', data: scoreHist, borderColor: '#5C8BA5', backgroundColor: 'rgba(92,139,165,.1)', fill: true, tension: 0.3, yAxisID: 'y' },
        { label: 'RSI', data: rsiHist, borderColor: '#B5A642', backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y2', borderDash: [4, 3] },
      ],
    },
    options: {
      responsive: false,
      plugins: { legend: { position: 'top' } },
      scales: {
        y:  { min: 0, max: 100, position: 'left',  ticks: { color: '#9A8E6E' }, grid: { color: '#4E4A38' } },
        y2: { min: 0, max: 100, position: 'right', ticks: { color: '#B5A642' }, grid: { display: false } },
        x:  { ticks: { color: '#9A8E6E' }, grid: { color: '#4E4A38' } },
      },
    },
  });

  // メモ
  const memoEl = document.getElementById('modal-memo');
  if (curWeek.memo) {
    memoEl.style.display = 'block';
    memoEl.textContent = curWeek.memo;
  } else { memoEl.style.display = 'none'; }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  // 引数なし = Xボタン押下: 無条件で閉じる
  // 引数あり = overlay クリック: overlay 自体のクリックのみ閉じる（内側のカードは無視）
  if (e && e.target && e.target.id !== 'modal-overlay') return;
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ------- CSV HANDLING ------- */
function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const files = e.dataTransfer?.files;
  if (files?.length) processCSVFiles(files);
}

function handleFileSelect(e) {
  const files = e.target.files;
  if (files?.length) processCSVFiles(files);
  e.target.value = '';
}

async function processCSVFiles(fileList) {
  const statusEl = document.getElementById('csv-status');
  const previewEl = document.getElementById('csv-preview');
  const files = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.csv'));
  if (!files.length) return;

  statusEl.textContent = `解析中... (0/${files.length})`;
  previewEl.innerHTML = '';

  const fileErrors = [];  // [{name, errors:[{line,reason}]}]
  const fatalErrors = []; // [{name, message}]
  let processedCount = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    statusEl.textContent = `解析中... (${i + 1}/${files.length})`;

    try {
      const buf = await readFileBuffer(file);
      const text = decodeBuffer(buf);
      const { rows, errors, error } = parseCSVText(text);

      if (error) { fatalErrors.push({ name: file.name, message: error }); continue; }
      if (rows.length === 0) { fatalErrors.push({ name: file.name, message: 'データ行が見つかりません' }); continue; }

      if (errors.length > 0) fileErrors.push({ name: file.name, errors });

      const latestDate = rows[rows.length - 1].date;
      _currentWeekId = getWeekId(latestDate);
      const prevWkId = getPrevWeekId(_currentWeekId);
      const prevWeek = prevWkId ? getWeeks()[prevWkId] : null;

      const detectedCode = detectCodeFromFileName(file.name);
      if (detectedCode && CONFIG.TICKERS[detectedCode]) {
        const prevCreditRatio = prevWeek?.tickers?.[detectedCode]?.creditRatio ?? null;
        _csvIndicators[detectedCode] = computeIndicators(rows, prevCreditRatio);
      } else {
        Object.keys(CONFIG.TICKERS).forEach(code => {
          const prevCreditRatio = prevWeek?.tickers?.[code]?.creditRatio ?? null;
          _csvIndicators[code] = computeIndicators(rows, prevCreditRatio);
        });
      }
      processedCount++;
    } catch(ex) {
      fatalErrors.push({ name: file.name, message: ex.message });
    }
  }

  // プレビュー表示
  const codes = Object.keys(_csvIndicators);
  const loadedCount = codes.length;
  let previewHTML = `<div style="margin-top:8px;font-size:12px;color:var(--green)">解析完了: ${processedCount}/${files.length}ファイル (週ID: ${_currentWeekId || '—'})</div>`;
  previewHTML += `<table class="csv-preview-table"><thead><tr>
    <th>銘柄</th><th>終値</th><th>RSI</th><th>乖離%</th><th>信用倍率</th><th>信用変化%</th>
  </tr></thead><tbody>`;
  codes.forEach(code => {
    const ind = _csvIndicators[code];
    previewHTML += `<tr>
      <td>${CONFIG.TICKERS[code]?.name || code}</td>
      <td>${ind.close != null ? fmtNum(ind.close) : '—'}</td>
      <td>${ind.rsiOk ? fmt(ind.rsi) : '—'}</td>
      <td>${ind.ma75Ok ? fmt(ind.ma75Disparity) : '—'}</td>
      <td>${ind.creditRatio != null ? fmt(ind.creditRatio, 2) : '—'}</td>
      <td>${ind.creditRatioWeekChange != null ? fmt(ind.creditRatioWeekChange) : '—'}</td>
    </tr>`;
  });
  previewHTML += '</tbody></table>';

  if (fileErrors.length > 0) {
    fileErrors.forEach(fe => {
      previewHTML += `<div style="margin-top:4px;font-size:12px;font-weight:600;color:var(--text2)">${fe.name}</div>`;
      previewHTML += `<ul class="csv-error-list">${fe.errors.map(e => `<li>行${e.line}: ${e.reason}</li>`).join('')}</ul>`;
    });
  }
  if (fatalErrors.length > 0) {
    previewHTML += `<ul class="csv-error-list">${fatalErrors.map(fe => `<li>${fe.name}: ${fe.message}</li>`).join('')}</ul>`;
  }
  previewEl.innerHTML = previewHTML;

  const fileLabel = files.length === 1 ? files[0].name : `${files.length}ファイル`;
  const statusText = `${fileLabel} (計${loadedCount}銘柄読み込み済み)`;
  if (fatalErrors.length > 0) {
    statusEl.innerHTML = statusText + ` <span style="color:var(--red)">エラー: ${fatalErrors.length}ファイル</span>`;
  } else {
    statusEl.textContent = statusText;
  }

  renderTickerAdjustments();
  updateSaveBtn();
}

function detectCodeFromFileName(name) {
  // ファイル名から銘柄コード（4桁数字）を検出
  const m = name.match(/(\d{4})/);
  if (m && CONFIG.TICKERS[m[1]]) return m[1];
  return null;
}

/* ------- SAVE ------- */
function saveWeekData() {
  const weekId = _currentWeekId || getWeekId(new Date().toISOString().slice(0, 10));

  // テーマデータ収集
  const themes = {};
  CONFIG.THEMES.forEach(theme => {
    const activeToggle = document.querySelector(`.toggle-btn.active[data-theme="${theme.id}"][data-toggle]`);
    const leadingInput = document.querySelector(`input[data-theme="${theme.id}"][data-leading]`);
    themes[theme.id] = {
      toggle: activeToggle?.dataset.toggle || '中立',
      leadingValue: leadingInput?.value || '',
    };
  });

  // 銘柄データ収集
  const savedSettings = getSettings();
  const tickers = {};
  Object.keys(CONFIG.TICKERS).forEach(code => {
    const activeCons = document.querySelector(`.toggle-btn.active[data-code="${code}"][data-cons]`);
    const ind = _csvIndicators[code] || {};
    tickers[code] = {
      consensus: activeCons?.dataset.cons || '据置',
      daysToEarnings: calcDaysToEarnings(savedSettings.earningsDates?.[code] ?? null),
      close: ind.close ?? null,
      rsi: ind.rsi ?? null,
      rsiOk: ind.rsiOk ?? false,
      ma75: ind.ma75 ?? null,
      ma75Ok: ind.ma75Ok ?? false,
      ma75Disparity: ind.ma75Disparity ?? null,
      creditRatio: ind.creditRatio ?? null,
      creditOk: ind.creditOk ?? false,
      creditRatioWeekChange: ind.creditRatioWeekChange ?? null,
      bars: ind.bars ?? 0,
    };
  });

  const memo = document.getElementById('input-memo').value.trim();
  const activeClimate = document.querySelector('.toggle-btn.active[data-climate]');
  const climate = activeClimate?.dataset.climate || CONFIG.CLIMATE_DEFAULT;

  const ok = saveWeek(weekId, { themes, tickers, memo, climate });
  const statusEl = document.getElementById('save-status');
  if (ok) {
    const now = new Date();
    const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    saveMeta({ lastUpdated: now.toISOString(), enteredBy: 'user' });
    statusEl.innerHTML = `<span style="color:var(--green);font-weight:700">✓ 保存しました（最終保存: ${ts} / 週ID: ${weekId}）</span>`;
  } else {
    statusEl.innerHTML = `<span style="color:var(--red)">保存に失敗しました（LocalStorage容量超過の可能性があります）</span>`;
  }
}

/* ------- EXPORT / IMPORT / RESET ------- */

/** 全LocalStorageデータを1オブジェクトにまとめる（純粋関数・テスト可能）*/
function gatherBackupData() {
  return {
    meta: getMeta(),
    weeks: getWeeks(),
    settings: getSettings(),
    exportedAt: new Date().toISOString(),
    schemaVersion: CONFIG.SCHEMA_VERSION,
  };
}

/** バックアップJSONの最低限の形式を検証する（純粋関数・テスト可能）*/
function validateBackupJSON(obj) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj))
    return { ok: false, reason: 'JSONオブジェクトではございません' };
  if (!obj.weeks && !obj.meta)
    return { ok: false, reason: 'weeks / meta キーが見当たりません' };
  return { ok: true };
}

function showBackupStatus(msg, type) {
  const el = document.getElementById('backup-status');
  if (!el) return;
  el.style.display = 'block';
  el.style.color = type === 'red' ? 'var(--red)' : 'var(--green)';
  el.textContent = msg;
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function exportData() {
  const data = gatherBackupData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `KABUBU_写本_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showBackupStatus('写本の作成、滞りなく相済みましてございます', 'green');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let obj;
    try {
      obj = JSON.parse(e.target.result);
    } catch (_) {
      showBackupStatus('申し訳ございません――JSONの解析に失敗いたしました。ファイルをご確認くださいませ', 'red');
      return;
    }
    const { ok, reason } = validateBackupJSON(obj);
    if (!ok) {
      showBackupStatus(`記録簿の形式が正しくございません: ${reason}`, 'red');
      return;
    }
    if (!confirm('記録簿を書き換えますが、よろしゅうございますか？\n（現在のデータは上書きされてしまいます）')) return;
    if (obj.meta)     lsSet(CONFIG.LS_META, obj.meta);
    if (obj.weeks)    lsSet(CONFIG.LS_WEEKS, obj.weeks);
    if (obj.settings) lsSet(CONFIG.LS_SETTINGS, obj.settings);
    navigate('dashboard');
    showBackupStatus('記録簿の復元、滞りなく相済みましてございます', 'green');
  };
  reader.onerror = () => {
    showBackupStatus('ファイルの読み込みに失敗いたしました', 'red');
  };
  reader.readAsText(file);
}

function clearData() {
  if (!confirm('すべてのデータを削除しますか？この操作は取り消せません。')) return;
  [CONFIG.LS_META, CONFIG.LS_WEEKS, CONFIG.LS_SETTINGS].forEach(k => {
    try { localStorage.removeItem(k); } catch(_) {}
  });
  renderDashboard();
}

function runTests() {
  document.getElementById('test-panel').style.display = 'block';
  document.getElementById('screen-dashboard').style.display = 'none';
  document.getElementById('screen-input').style.display = 'none';
  document.getElementById('nav').style.display = 'none';

  const results = [];
  function assert(name, cond, detail = '') {
    results.push({ name, pass: !!cond, detail });
  }
  function approxEq(a, b, eps = 0.5) { return Math.abs(a - b) <= eps; }

  // --- Test 1: calcSMA ---
  const closes = [100,102,98,105,103,107,104,106,108,110,109,111,112,114,113];
  const sma5 = calcSMA(closes, 5);
  assert('calcSMA(5) 正常計算', approxEq(sma5, (113+114+112+111+109)/5), `got ${sma5}`);
  assert('calcSMA 不足本数→null', calcSMA([1,2,3], 5) === null);

  // --- Test 2: calcRSI ---
  // 15本の単調上昇
  const risingSeries = Array.from({length: 15}, (_, i) => 100 + i);
  const rsiAll = calcRSI(risingSeries);
  assert('calcRSI 単調上昇→100', rsiAll === 100, `got ${rsiAll}`);
  assert('calcRSI 不足本数→null', calcRSI([1,2,3]) === null);
  // 実際の値テスト (14本+1)
  const mixedSeries = [100,102,101,103,102,104,103,105,104,106,105,107,106,108,107];
  const rsiMixed = calcRSI(mixedSeries);
  assert('calcRSI 混在系列→0-100範囲', rsiMixed != null && rsiMixed >= 0 && rsiMixed <= 100, `got ${rsiMixed}`);

  // --- Test 3: calcDisparity ---
  assert('calcDisparity 正常', approxEq(calcDisparity(110, 100), 10.0));

  const testKey = 'rotation_v3_weeks';
  const origWeeks = lsGet(testKey);
  // 52週+1を書いてFIFO確認
  const testWeeks = {};
  for (let i = 0; i < 53; i++) {

  const oldestKey = Object.keys(testWeeks).sort()[0];

  const afterFIFO = getWeeks();

  // --- Test 12: calcDaysToEarnings ---
  const _today = new Date();
  const _fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const _future10 = new Date(_today); _future10.setDate(_today.getDate() + 10);
  const _past1    = new Date(_today); _past1.setDate(_today.getDate() - 1);
  assert('calcDaysToEarnings 10日後→10',   calcDaysToEarnings(_fmt(_future10)) === 10);
  assert('calcDaysToEarnings 今日→0',       calcDaysToEarnings(_fmt(_today))    === 0);
  assert('calcDaysToEarnings 昨日→null',    calcDaysToEarnings(_fmt(_past1))    === null);
  assert('calcDaysToEarnings null→null',    calcDaysToEarnings(null)            === null);
  assert('calcDaysToEarnings 空文字→null',  calcDaysToEarnings('')              === null);

  // --- Test 13: generateLadyComment ---
  function mkTd(rsi, rsiOk, disp, ma75Ok, cred, creditOk, dte) {
    return { td: { rsi, rsiOk, ma75Disparity: disp, ma75Ok, creditRatioWeekChange: cred, creditOk, daysToEarnings: dte }, themeScore: 50 };

  // 過熱(RSI>=75 かつ 乖離>=20%) → 「ご用心」を含む

  // --- Test 16: calcFreshnessLevel 境界値 ---

  // --- Test 17: calcDataQuality ---
  function mkDQ(rsiOk, ma75Ok, creditOk, hasEarnings) {

      rsiOk, rsi: rsiOk ? 50 : null,

  assert('ΔRSI 下落-15',       calcRsiDelta(50, 65) === -15);

  assert('RsiAdj 前週なし',    calcRsiDeltaAdj(75, null) === 0);
  const mSpike  = { rsi:72, ma75Disparity:null, creditRatioWeekChange:null, daysToEarnings:null, rsiDelta:15 };
  const mNoPrev = { rsi:72, ma75Disparity:null, creditRatioWeekChange:null, daysToEarnings:null, rsiDelta:null };
  assert('スコア急騰時減点あり', calcTickerScore(mSpike) < calcTickerScore(mNoPrev));
  assert('前週なしは補正なし',   calcTickerScore(mNoPrev) === calcTickerScore({ rsi:72, ma75Disparity:null, creditRatioWeekChange:null, daysToEarnings:null }));
  assert('blue ΔRSI急騰',       classifySignal({ tickerScore:50, themeScore:50, rsi:70, ma75Disparity:5, consensus:'据置', acquiredPrice:null, currentClose:null, rsiDelta:15 }) === 'blue');
  assert('ΔRSI null→blue不発',  classifySignal({ tickerScore:50, themeScore:50, rsi:70, ma75Disparity:5, consensus:'据置', acquiredPrice:null, currentClose:null, rsiDelta:null }) !== 'blue');

  // --- Test 20: 本日の空模様（地盤補正） ---
  assert('地盤値: AI半導体→1',     getGroundValue('ai_semi')   === 1);
  assert('地盤値: 電力再建→4',     getGroundValue('ai_infra')  === 4);
  assert('地盤値: 金融→5',         getGroundValue('finance')   === 5);
  assert('地盤値: 防衛→3',         getGroundValue('defense')   === 3);
  assert('地盤値: エンタメ→4',     getGroundValue('entertain') === 4);
  // (a) 嵐×地盤1で-14される
  assert('嵐×地盤1→-14',           calcClimateAdj('storm', 1) === -14);
  assert('嵐×地盤1 最終スコア反映', applyClimateAdj(72, calcClimateAdj('storm', 1)) === 58);
  // (b) 嵐×地盤5で+6される
  assert('嵐×地盤5→+6',            calcClimateAdj('storm', 5) === 6);
  assert('嵐×地盤5 最終スコア反映', applyClimateAdj(72, calcClimateAdj('storm', 5)) === 78);
  // 嵐×地盤3(中立)は無補正
  assert('嵐×地盤3→0',             calcClimateAdj('storm', 3) === 0);
  // (c) 曇り/快晴では補正されない
  assert('曇り×地盤1→補正なし',    calcClimateAdj('cloudy', 1) === 0);
  assert('快晴×地盤1→補正なし',    calcClimateAdj('clear', 1) === 0);
  assert('雨×地盤1→補正なし',      calcClimateAdj('rain', 1) === 0);
  assert('未選択(undefined)→補正なし', calcClimateAdj(undefined, 1) === 0);
  // (d) クランプが効く
  assert('上限クランプ: 98+嵐地盤5(+6)→100', applyClimateAdj(98, calcClimateAdj('storm', 5)) === 100);
  assert('下限クランプ: 5+嵐地盤1(-14)→0',   applyClimateAdj(5, calcClimateAdj('storm', 1)) === 0);
  // テーマスコア・各配点には影響しないことの確認（calcTickerScoreの結果は空模様を知らない）
  const _mClimate = { rsi:34.9, ma75Disparity:null, creditRatioWeekChange:null, daysToEarnings:null };
  assert('calcTickerScoreは空模様非依存', calcTickerScore(_mClimate) === 55);

  // --- Test 21: 航海日誌（buildVoyageLogEntries） ---
  const _vWeeks = {
    '2026-06-05': { climate: 'clear', memo: '先週の所見' },
    '2026-06-12': { climate: 'storm' }, // memo未設定
    '2026-06-19': { memo: '今週の所見' }, // climate未設定

  const _vIds = ['2026-06-05', '2026-06-12', '2026-06-19'];

  assert('航海日誌: 3週分が返る', _vEntries.length === 3);
  assert('航海日誌: 新しい週から降順', _vEntries.map(e => e.weekId).join(',') === '2026-06-19,2026-06-12,2026-06-05');
  assert('航海日誌: 空模様を整形', _vEntries[2].climateText === '☀ 快晴（リスクオン）');
  assert('航海日誌: climate未設定→記録なし', _vEntries[0].climateText === '記録なし');
  assert('航海日誌: memo未設定→所見の記載なし', _vEntries[1].memoText === '所見の記載なし');
  assert('航海日誌: memoは保存値そのまま', _vEntries[0].memoText === '今週の所見');
  assert('航海日誌: 1週のみでも正しく1件返る', buildVoyageLogEntries({ '2026-06-19': { climate: 'rain', memo: 'm' } }, ['2026-06-19']).length === 1);
  assert('航海日誌: 0週なら空配列', buildVoyageLogEntries({}, []).length === 0);

  // --- 結果表示 ---
  const pass = results.filter(r => r.pass).length;
  const fail = results.filter(r => !r.pass).length;
  const html = `<h2 style="margin-bottom:16px">🧪 テスト結果</h2>` +
    results.map(r => `<div class="test-result ${r.pass ? 'test-pass':'test-fail'}">
      ${r.pass ? '✅':'❌'} ${r.name}${r.detail ? ' — '+r.detail:''}
    </div>`).join('') +
    `<div class="test-summary ${fail===0?'test-pass':'test-fail'}">
      ${fail===0?'✅ 全テスト通過':'❌ 失敗'}: ${pass}/${pass+fail}件
    </div>`;
  document.getElementById('test-panel').innerHTML = html;
}
