<!-- ============================================================
     Chart.js compatible inline implementation (Canvas-based)
     Replaces Chart.js 4.x UMD — implements the API subset used
     by this app (horizontal bar + line with dual Y-axis).
     No external network calls. Self-contained.
     ============================================================ -->
<script id="chartjs-vendor">
(function(global) {
  'use strict';

  const COLORS = {
    grid: '#4E4A38',
    text: '#9A8E6E',
    bg:   '#201F1D',
  };

  function px(v) { return Math.round(v); }

  function drawRoundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, Math.abs(h)/2, Math.abs(w)/2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  class MiniChart {
    constructor(canvas, config) {
      if (typeof canvas === 'string') canvas = document.getElementById(canvas);
      this.canvas = canvas;
      this.ctx = canvas.getContext('2d');
      this.config = config;
      this._legendVisible = {};
      config.data?.datasets?.forEach((ds, i) => { this._legendVisible[i] = true; });
      this._bindEvents();
      this._render();
    }

    update(newConfig) {
      if (newConfig) {
        this.config = newConfig;
        this._legendVisible = {};
        newConfig.data?.datasets?.forEach((ds, i) => { this._legendVisible[i] = true; });
      }
      this._render();
    }

    destroy() {
      if (this._clickHandler) this.canvas.removeEventListener('click', this._clickHandler);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }

    _bindEvents() {
      this._clickHandler = (e) => this._handleClick(e);
      this.canvas.addEventListener('click', this._clickHandler);
    }

    _handleClick(e) {
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const cx = x * scaleX, cy = y * scaleY;
      // Check legend click
      if (this._legendHitAreas) {
        this._legendHitAreas.forEach((area, i) => {
          if (cx >= area.x && cx <= area.x + area.w && cy >= area.y && cy <= area.y + area.h) {
            this._legendVisible[i] = !this._legendVisible[i];
            this._render();
          }
        });
      }
    }

    _render() {
      const { type, data, options = {} } = this.config;
      const isHBar = type === 'bar' && options.indexAxis === 'y';
      this.canvas.width = this.canvas.offsetWidth || 340;
      this.canvas.height = this.canvas.offsetHeight || 160;
      const ctx = this.ctx;
      ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      if (isHBar) this._renderHBar(data, options);
      else if (type === 'line') this._renderLine(data, options);
      else if (type === 'bar') this._renderVBar(data, options);
    }

    _renderHBar(data, options) {
      const ctx = this.ctx;
      const W = this.canvas.width, H = this.canvas.height;
      const labels = data.labels || [];
      const ds = data.datasets?.[0] || {};
      const values = ds.data || [];
      const colors = Array.isArray(ds.backgroundColor) ? ds.backgroundColor : Array(values.length).fill(ds.backgroundColor || '#4488ff');

      const padL = 120, padR = 50, padT = 14, padB = 24;
      const chartW = W - padL - padR;
      const chartH = H - padT - padB;
      const maxVal = options.scales?.x?.max ?? Math.max(...values.filter(v => v != null), 1);
      const barH = Math.max(8, Math.min(28, (chartH / labels.length) - 6));
      const gap = (chartH - barH * labels.length) / Math.max(labels.length + 1, 1);

      // Grid lines
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      [0, 25, 50, 75, 100].forEach(v => {
        const x = px(padL + (v / maxVal) * chartW);
        ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, H - padB); ctx.stroke();
        ctx.fillStyle = COLORS.text;
        ctx.font = '10px Georgia, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(v, x, H - padB + 14);
      });

      // Bars
      labels.forEach((label, i) => {
        const val = values[i];
        if (val == null) return;
        const y = padT + gap * (i + 1) + barH * i;
        const bw = (val / maxVal) * chartW;

        // Background
        ctx.fillStyle = 'rgba(255,255,255,.05)';
        drawRoundRect(ctx, padL, y, chartW, barH, 4);
        ctx.fill();

        // Bar
        const col = Array.isArray(colors) ? colors[i] : colors;
        ctx.fillStyle = col || '#4488ff';
        if (bw > 0) { drawRoundRect(ctx, padL, y, bw, barH, 4); ctx.fill(); }

        // Label
        ctx.fillStyle = COLORS.text;
        ctx.font = '12px Georgia, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, padL - 6, y + barH / 2);

        // Value
        ctx.fillStyle = '#F0EAD6';
        ctx.font = 'bold 11px Georgia, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(val, padL + bw + 4, y + barH / 2);
      });
    }

    _renderLine(data, options) {
      const ctx = this.ctx;
      const W = this.canvas.width, H = this.canvas.height;
      const labels = data.labels || [];
      const datasets = data.datasets || [];
      const hasLegend = options.plugins?.legend?.position === 'top';
      const legendH = hasLegend ? 28 : 0;
      const padL = 36, padR = 36, padT = legendH + 10, padB = 24;
      const chartW = W - padL - padR;
      const chartH = H - padT - padB;

      this._legendHitAreas = [];

      // Legend
      if (hasLegend) {
        let lx = padL;
        datasets.forEach((ds, i) => {
          const color = ds.borderColor || '#4488ff';
          const visible = this._legendVisible[i] !== false;
          ctx.fillStyle = visible ? color : COLORS.text;
          ctx.fillRect(lx, 8, 14, 10);
          ctx.fillStyle = visible ? '#F0EAD6' : COLORS.text;
          ctx.font = '11px Georgia, sans-serif';
          ctx.textBaseline = 'middle';
          ctx.textAlign = 'left';
          ctx.fillText(ds.label || '', lx + 18, 13);
          const tw = ctx.measureText(ds.label || '').width;
          this._legendHitAreas.push({ x: lx, y: 4, w: tw + 24, h: 18 });
          lx += tw + 36;
        });
      }

      // Grid
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      const yScale = options.scales?.y || {};
      const yMin = yScale.min ?? 0, yMax = yScale.max ?? 100;
      [0, 25, 50, 75, 100].forEach(v => {
        if (v < yMin || v > yMax) return;
        const yp = px(padT + chartH - ((v - yMin) / (yMax - yMin)) * chartH);
        ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(W - padR, yp); ctx.stroke();
        ctx.fillStyle = COLORS.text;
        ctx.font = '10px Georgia, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(v, padL - 4, yp);
      });

      // X labels
      ctx.fillStyle = COLORS.text;
      ctx.font = '10px Georgia, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const step = Math.ceil(labels.length / 6);
      labels.forEach((lbl, i) => {
        if (i % step !== 0 && i !== labels.length - 1) return;
        const xp = px(padL + (i / Math.max(labels.length - 1, 1)) * chartW);
        ctx.fillText(lbl, xp, H - padB + 4);
      });

      // Draw each dataset
      datasets.forEach((ds, di) => {
        if (this._legendVisible[di] === false) return;
        const points = ds.data || [];
        const color = ds.borderColor || '#4488ff';
        const yid = ds.yAxisID || 'y';
        const scl = options.scales?.[yid] || {};
        const sMin = scl.min ?? 0, sMax = scl.max ?? 100;
        const yPos = (v) => {
          if (v == null || isNaN(v)) return null;
          return px(padT + chartH - ((v - sMin) / (sMax - sMin)) * chartH);
        };
        const xPos = (i) => px(padL + (i / Math.max(points.length - 1, 1)) * chartW);

        // Fill
        if (ds.fill && ds.backgroundColor) {
          ctx.beginPath();
          let started = false;
          points.forEach((v, i) => {
            const yp = yPos(v), xp = xPos(i);
            if (yp === null) return;
            if (!started) { ctx.moveTo(xp, yp); started = true; }
            else { ctx.lineTo(xp, yp); }
          });
          if (started) {
            ctx.lineTo(xPos(points.length - 1), padT + chartH);
            ctx.lineTo(padL, padT + chartH);
            ctx.closePath();
            ctx.fillStyle = ds.backgroundColor;
            ctx.fill();
          }
        }

        // Line
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        if (ds.borderDash) ctx.setLineDash(ds.borderDash);
        else ctx.setLineDash([]);
        let moved = false;
        points.forEach((v, i) => {
          const yp = yPos(v), xp = xPos(i);
          if (yp === null) { moved = false; return; }
          if (!moved) { ctx.moveTo(xp, yp); moved = true; }
          else { ctx.lineTo(xp, yp); }
        });
        ctx.stroke();
        ctx.setLineDash([]);

        // Dots
        ctx.fillStyle = color;
        points.forEach((v, i) => {
          const yp = yPos(v), xp = xPos(i);
          if (yp === null) return;
          ctx.beginPath(); ctx.arc(xp, yp, 3, 0, Math.PI * 2); ctx.fill();
        });
      });
    }

    _renderVBar(data, options) {
      // Vertical bar (unused but provided for completeness)
      this._renderLine({ ...data, datasets: data.datasets.map(d => ({ ...d, type:'line' })) }, options);
    }
  }

  global.Chart = MiniChart;
})(window);
</script>
